name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like and why?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Website (modelpedia.dev)
        - API (api.modelpedia.dev)
        - npm package (modelpedia)
        - Model data
        - New provider
