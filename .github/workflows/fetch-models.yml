name: Fetch Model Data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: fetch-models
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build data package
        run: pnpm --filter modelpedia build

      - name: Fetch all providers
        working-directory: packages/data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          scripts=(
            fetch:openai fetch:anthropic fetch:google fetch:mistral
            fetch:deepseek fetch:xai fetch:cohere fetch:zai
            fetch:minimax fetch:alibaba fetch:meta fetch:moonshot
            fetch:cerebras fetch:baseten fetch:openrouter fetch:perplexity
            fetch:azure fetch:groq fetch:nvidia fetch:together
            fetch:fireworks fetch:amazon fetch:vercel fetch:vertex
            fetch:cloudflare-workers-ai fetch:cloudflare-ai-gateway fetch:opencode fetch:ollama fetch:huggingface
            fetch:qwen
          )
          for script in "${scripts[@]}"; do
            echo "::group::$script"
            bun run "$script" || echo "::warning::$script failed"
            echo "::endgroup::"
          done

      - name: Regenerate data
        working-directory: packages/data
        run: bun run generate

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet packages/data/providers packages/data/src; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes and create or update PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="data/auto-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if branch already exists on remote
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard origin/master
          else
            git checkout -b "$BRANCH"
          fi

          git add packages/data/providers packages/data/src/data.ts
          git commit -m "data: update model data $(date +%Y-%m-%d)"
          git push origin "$BRANCH" --force

          SUMMARY=$(cd packages/data && bun run changes -- HEAD~1 --dry-run 2>&1)

          # Create PR if none exists, otherwise update the existing one
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" \
              --title "data: update model data $(date +%Y-%m-%d)" \
              --body "$(printf '## Automated model data update\n\n```\n%s\n```\n\n> Auto-created by the fetch-models workflow.\n> Changes will be detected on merge.' "$SUMMARY")"
            echo "Updated PR #$EXISTING_PR"
          else
            gh pr create \
              --title "data: update model data $(date +%Y-%m-%d)" \
              --body "$(printf '## Automated model data update\n\n```\n%s\n```\n\n> Auto-created by the fetch-models workflow.\n> Changes will be detected on merge.' "$SUMMARY")"
          fi
